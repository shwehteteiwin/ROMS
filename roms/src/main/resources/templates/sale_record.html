<!DOCTYPE html>
<html>
<meta charset="UTF-8">
<head>
    <title>Order Sales Record</title>
<link rel="preload" as="image" href="/images/wooden1.jpg">
    <link rel="stylesheet" href="/css/Staff/sale_record.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="/css/staff_main.css">
    <link rel="stylesheet" href="/css/staff_sideBar.css">

</head>
<body>
    <div class="sidebar">
        <div class="logo">Manager Panel</div>
        <div class="menu">
            <a href="/lowStock" class="menu-item">View Low Stock</a>
            <a href="/manageInventory" class="menu-item">Manage Inventory</a>
            <a href="/manageCategory" class="menu-item">Manage Category</a>
            <a href="/manage_menus" class="menu-item">Manage Menus</a>
            <a href="/manageTable" class="menu-item">Manage Table</a>
            <a href="/sale_record" class="menu-item activ">View Sale Records</a>
        </div>
    </div>
<div class="form-card main-content">
        <div class="top-right">
            <div class="custom-select" id="reportSelect">
                <div class="selected">Daily</div>

                <div class="options">
                    <div class="option" data-value="daily">Daily</div>
                    <div class="option" data-value="monthly">Monthly</div>
                </div>
            </div>
        </div>
    <div>
        <div class="card-container" id="cardContainer">
            <div class="card-item header">
                <div class="card-info">
                    <h2 class="name" id="dateHeader">Date</h2>
                    <h2 class="name">Total Sales</h2>
                </div>
            </div>
            <div class="card-container" id="cardContainer"></div>
        </div>

        <p id="noRecord"></p>
    </div>
</div>
<script src="/js/Staff/sale_record.js"></script>
    <script src="/js/staff_sidebar.js"></script>

</body>
</html>
