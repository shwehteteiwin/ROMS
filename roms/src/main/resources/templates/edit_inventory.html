<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Edit Inventory</title>

<link rel="preload" as="image" href="/images/wooden1.jpg">
    <link rel="stylesheet" href="/css/manager/add_category.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="/css/staff_main.css">
    <link rel="stylesheet" href="/css/staff/staff_login.css">
    <link rel="stylesheet" href="/css/staff_sideBar.css">

<style>
        .form-card{
            min-width: 450px;
        }
         
    .modal {
        display: none; 
        position: fixed;
        z-index: 9999;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);

        justify-content: center;
        align-items: center;
    }

    .modal-content {
        background: #fff;
        padding: 30px;
        border-radius: 20px;
        width: 350px;
        max-width: 90%;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        animation: fadeIn 0.3s ease;
        color: #2ecc71;

    }


    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    } 
    /* CUSTOM SELECT */

.custom-select {
  position: relative;
  width: 100%;
}

/* Same style as input box */
.select-trigger {
  width: 100%;
  padding: 10px;
  border: 2px solid transparent;
  border-radius: 14px;
  font-size: 12px;
  background: var(--bg-input);
  outline: none;
  transition: 0.3s;

  display: flex;
  justify-content: space-between;
  align-items: center;

  cursor: pointer;
  color: black;
}

/* Hover like input focus */
.select-trigger:hover {
  border-color: var(--more-green-color--);
  background: white;
}

/* Dropdown list */
.options-list {
  position: absolute;
  top: 105%;
  left: 0;
  width: 100%;

  background: white;
  border-radius: 14px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.15);
  border: 1px solid #eee;

  display: none; /* JS controls this */
  overflow: hidden;
  z-index: 200;
}

/* Options */
.option {
  padding: 12px 15px;
  cursor: pointer;
  transition: 0.2s;
  color: black;
  font-size: 12px;
}

.option:hover {
  background-color: var(--more-green-color--);
  color: white;
}
    </style>
</head>
<body>
<div class="sidebar">
        <div class="logo">Manager Panel</div>
        <div class="menu">
            <a href="/lowStock" class="menu-item">View Low Stock</a>
            <a href="/manageInventory" class="menu-item active">Manage Inventory</a>
            <a href="/manageCategory" class="menu-item">Manage Category</a>
            <a href="/manage_menus" class="menu-item">Manage Menus</a>
            <a href="/manageTable" class="menu-item">Manage Table</a>
            <a href="/sale_record" class="menu-item">View Sale Records</a>
        </div>
    </div>
<div class="form-card two-column-card main-content">

    <div class="card-header">
        <h2>Edit Inventory</h2>
    </div>

    <form id="editInventoryForm">
        <div class="input-group">

            <label>Inventory Name</label>
            <input type="text" id="inventory-name" required>

            <label>Quantity</label>
            <input type="number" id="inv-qty" required>

            <label>Unit</label>

            <!--CUSTOM DROPDOWN -->
            <div id="customSelect" class="custom-select">

                <div class="select-trigger">
                    <span id="selectedUnit">Select Unit</span>
                </div>

                <div class="options-list">
                    <div class="option" data-value="kg">kg</div>
                    <div class="option" data-value="pcs">pcs</div>
                    <div class="option" data-value="liter">liter</div>
                </div>

            </div>

            <input type="hidden" id="unit">

            <label>Threshold</label>
            <input type="number" id="inv-threshold" required>

            <label>Expiry Date</label>
            <input type="date" id="exp-date" required>

        </div>

        <div class="btns">
            <button type="button" id="cancelBtn" class="cancel-btn">Cancel</button>
            <button type="button" id="updateBtn" class="submit-btn">Update</button>
        </div>

    </form>
</div>

<!-- MODAL  -->

<div id="confirmModal" class="modal">

    <div class="modal-content">

        <div id="confirmText"></div>

        <div class="btns">
            <button type="button" id="backBtn" class="cancel-btn">
                Back
            </button>

            <button type="button" id="confirmBtn" class="submit-btn">
                Confirm
            </button>
        </div>

    </div>

</div>



<script src="/js/manager/edit_inventory.js"></script>
    <script src="/js/staff_sidebar.js"></script>

</body>
</html>
