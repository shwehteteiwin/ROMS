<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Change Password</title>
<link rel="preload" as="image" href="/images/photos/resturant4.jpg">
<link rel="stylesheet" href="/node_modules/bootstrap/dist/css/bootstrap.min.css">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
<link rel="stylesheet" href="/css/customer/change_password.css">
<link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/nav.css" />


</head>

<body>

<!-- background blur -->
<div class="blur-overlay" id="overlay"></div>
    <header>
    <nav class="nav">
        <div class="logo">My Restaurant</div>
        <div class="nav-links">
        <a href="/dashboard">Home</a>
        <a href="/menu">Menu</a>
        <a href="/reservations/myReservation">My Reservation</a>
        <a href="/cus_order_status_bills">Order Status and Bills</a>
        <a href="/profile">Profile</a>
        <!-- <a href="/login">Login/ Sign-up</a> -->
        </div>
    </nav>
    </header>
<div class="animate__animated animate__fadeIn password-box text-center">

    <h3 class="title">Change Password</h3>

    <!-- Current Password -->
    <div class="input-wrapper">
        <input type="password" id="currentPwd" placeholder="Current Password">
        <i class="fa-regular fa-eye-slash toggle" onclick="togglePwd('currentPwd', this)"></i>
    </div>

    <!-- New Password -->
    <div class="input-wrapper">
        <input type="password" id="newPwd" placeholder="New Password">
        <i class="fa-regular fa-eye-slash toggle" onclick="togglePwd('newPwd', this)"></i>
    </div>

    <!-- Confirm Password -->
    <div class="input-wrapper">
        <input type="password" id="confirmPwd" placeholder="Confirm Password">
        <i class="fa-regular fa-eye-slash toggle" onclick="togglePwd('confirmPwd', this)"></i>
    </div>

    <!-- Buttons -->
    <div class="btn-group-custom">
        <button class="discard-btn">Discard</button>
        <button class="apply-btn">Apply</button>
    </div>

</div>
    <!-- Success Alert -->
<div class="success-overlay" id="successAlert">
    <div class="success-box-blur"></div>
    <div class="success-box">
        
        <div class="success-icon">
            <i class="fa-solid fa-check"></i>
        </div>

        <h2>Successful!</h2>

        <button onclick="closeSuccess()">OK</button>
    </div>
</div>
<!-- Failed Alert -->
<div class="failed-overlay" id="failedAlert">
    <div class="failed-box-blur"></div>
    <div class="failed-box">
        <div class="failed-icon">
            <i class="fa-solid fa-xmark"></i>
        </div>

        <h2>Failed!</h2>
        <p>New passwords don't match</p>

        <button onclick="closeFailed()">Try Again</button>
    </div>
</div>
<!-- Discard Alert -->
<div class="discard-overlay" id="discardAlert">
    <div class="discard-box">
        <div class="discard-box-blur"></div>
        <div class="discard-icon">
            <i class="fa-solid fa-triangle-exclamation"></i>
        </div>

        <div class="discard-content">
            <h2>Discard Changes?</h2>
            <p>Your entered passwords will be cleared.</p>

            <div class="discard-actions">
                <button class="cancel-btn" onclick="closeDiscard()">Cancel</button>
                <button class="confirm-btn" onclick="confirmDiscard()">Discard</button>
            </div>
        </div>
    </div>
</div>


<script src="/js/customer/change_password.js"></script>
</body>
</html>
