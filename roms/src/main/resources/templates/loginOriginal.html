<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="preload" as="image" href="../photos/resturant4.jpg">
    <!-- <link rel="stylesheet" href="/css/customer/login.css"> -->
    <link rel="stylesheet" th:href="@{/css/customer/login.css}">

    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <!-- <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.min.css"> -->
</head>
<body>
    <div class="blur-overlay" id="overlay"></div>
    <div class="animate__animated animate__fadeIn container" id="container">
        <div class="form_box login" id="login_form" action="#" method="post">
            <form action="#">
                <h1 class="title">Login</h1>

                <div class="user_input">
                    <input type="email" id="user_email" class="email" required>
                    <label for="user_email">Email</label>
                </div>

                <div class="user_input">
                    <input type="password" id="login_password" class="password" required>
                    <label for="login_password">Password</label>
                    <i class="fa-regular fa-eye-slash togglePassword"></i>
                </div>

                <div class="forgetpwd">
                    <div class="notice">
                        <label for="notice"><input type="checkbox" name="notice" class="rememberme" id="rememberme">Remember Me</label>
                    </div>
                    <!-- <a href="./forget_ps.html">Forget password?</a> -->
                     <a th:href="@{/forget_ps.html}">Forget password?</a>
                </div>
                <button type="button" class="btn-login-w100 login_tab">Login</button>
            </form>
            
        </div>
        <div class="form_box register" id="register_form" action="#" method="post">
            <form action="#">
                <h1 class="title">Register</h1>

                <div class="user_input">
                    <input type="text" id="user_name" required>
                    <label for="user_name">Name</label>
                </div>

                <div class="user_input">
                    <input type="email" id="reg_email" required>
                    <label for="reg_email">Email</label>
                </div>

                <div class="user_input">
                    <input type="password" id="register_password" class="password" required>
                    <label for="register_password">Password</label>
                    <i class="fa-regular fa-eye-slash togglePassword"></i>
                </div>

                <div class="user_input">
                    <input type="password" id="confirm_password" class="password" required>
                    <label for="confirm_password">Confirm Password</label>
                    <i class="fa-regular fa-eye-slash togglePassword"></i>
                </div>
                <button type="button" class="btn-login-w100 register">Register</button>
            </form>
        </div>

        <div class="toggle-box">
            <div class="toggle-panel toggle-left">
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <button type="button" id="register-btn" class="btn-login-w100">Register</button>
            </div>

            <div class="toggle-panel toggle-right">
                <h1>Welcome Back!</h1>
                <p>Already have an account?</p>
                <button type="button" id="login-btn" class="btn-login-w100">Login</button>
            </div>
        </div>
    </div>
    <!-- <script th:src="@{/js/customer/login.js}"></script> -->
</body>
<script src="/js/login.js"></script>
 
</html>
